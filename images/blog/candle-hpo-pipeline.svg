<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 240" font-family="IBM Plex Sans, system-ui, sans-serif">
  <rect width="760" height="240" fill="#f9fafb" rx="6"/>

  <!-- HPO Algorithm box -->
  <rect x="24" y="30" width="176" height="180" rx="6" fill="#0d1b2a" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="112" y="56" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600" letter-spacing="0.08em" font-family="IBM Plex Mono, monospace">HPO ALGORITHM</text>
  <text x="112" y="80" text-anchor="middle" fill="#f0f9ff" font-size="12" font-weight="700">Supervisor</text>
  <line x1="44" y1="90" x2="180" y2="90" stroke="#22d3ee" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="112" y="110" text-anchor="middle" fill="#8ab2cc" font-size="10">mlrMBO (Bayes/GP)</text>
  <text x="112" y="126" text-anchor="middle" fill="#8ab2cc" font-size="10">DEAP (genetic alg)</text>
  <text x="112" y="142" text-anchor="middle" fill="#8ab2cc" font-size="10">Hyperopt (TPE)</text>
  <text x="112" y="158" text-anchor="middle" fill="#8ab2cc" font-size="10">Random search</text>
  <text x="112" y="180" text-anchor="middle" fill="#6b7280" font-size="9">Proposes next batch</text>
  <text x="112" y="194" text-anchor="middle" fill="#6b7280" font-size="9">of configurations</text>

  <!-- Arrow out: configs -->
  <line x1="200" y1="120" x2="260" y2="120" stroke="#374151" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="230" y="112" text-anchor="middle" fill="#6b7280" font-size="9">configs</text>

  <!-- Swift/T runtime box -->
  <rect x="260" y="30" width="216" height="180" rx="6" fill="#1b2d47" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="368" y="56" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="600" letter-spacing="0.08em" font-family="IBM Plex Mono, monospace">WORKFLOW RUNTIME</text>
  <text x="368" y="78" text-anchor="middle" fill="#f0f9ff" font-size="12" font-weight="700">Swift/T</text>
  <line x1="278" y1="88" x2="458" y2="88" stroke="#38bdf8" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="368" y="108" text-anchor="middle" fill="#8ab2cc" font-size="10">Parallel dataflow</text>
  <text x="368" y="124" text-anchor="middle" fill="#8ab2cc" font-size="10">1,000s concurrent jobs</text>
  <text x="368" y="140" text-anchor="middle" fill="#8ab2cc" font-size="10">Summit · Theta · Cori</text>
  <text x="368" y="162" text-anchor="middle" fill="#6b7280" font-size="9">Launches training on GPU</text>
  <text x="368" y="176" text-anchor="middle" fill="#6b7280" font-size="9">nodes; collects metrics</text>
  <text x="368" y="196" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600">10,000+ experiments</text>

  <!-- Arrow: results back -->
  <line x1="476" y1="120" x2="536" y2="120" stroke="#374151" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="506" y="112" text-anchor="middle" fill="#6b7280" font-size="9">metrics</text>

  <!-- Results box -->
  <rect x="536" y="30" width="200" height="180" rx="6" fill="#0f0a1e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="636" y="56" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600" letter-spacing="0.08em" font-family="IBM Plex Mono, monospace">ANALYSIS</text>
  <text x="636" y="78" text-anchor="middle" fill="#faf5ff" font-size="12" font-weight="700">NT3 + Probing</text>
  <line x1="554" y1="88" x2="718" y2="88" stroke="#f59e0b" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="636" y="108" text-anchor="middle" fill="#a09aba" font-size="10">Best model configs</text>
  <text x="636" y="124" text-anchor="middle" fill="#a09aba" font-size="10">Noise injection tests</text>
  <text x="636" y="140" text-anchor="middle" fill="#a09aba" font-size="10">Counterfactual analysis</text>
  <text x="636" y="162" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">PLOD2, RGS5, TP53I13</text>
  <text x="636" y="178" text-anchor="middle" fill="#a09aba" font-size="9">genes identified as</text>
  <text x="636" y="194" text-anchor="middle" fill="#a09aba" font-size="9">decision-boundary drivers</text>

  <!-- Bottom label -->
  <text x="380" y="226" text-anchor="middle" fill="#6b7280" font-size="10">Feedback loop: metrics inform HPO algorithm's surrogate model for next batch</text>

  <!-- Feedback arrow bottom -->
  <path d="M 260 160 Q 200 210 160 180" fill="none" stroke="#374151" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr2)"/>

  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
  </defs>
</svg>
