<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">PanguWeather DDP overview</title>
  <desc id="desc">Diagram showing DistributedSampler sharding batches across four ranks, each with a full model replica, followed by gradient all-reduce synchronization.</desc>
  <rect width="1400" height="760" rx="28" fill="#F8F5EF"/>
  <rect x="28" y="28" width="1344" height="704" rx="22" fill="#FFFCF8" stroke="#D9D2C6" stroke-width="2"/>
  <text x="72" y="96" fill="#1C2430" font-family="IBM Plex Sans, Arial, sans-serif" font-size="36" font-weight="700">Current Training Path: Plain Distributed Data Parallel (DDP)</text>
  <text x="72" y="136" fill="#546170" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20">Each rank gets a shard of the batch, keeps a full model replica, and synchronizes gradients explicitly after the backward pass.</text>

  <rect x="72" y="200" width="232" height="280" rx="20" fill="#EEF3F7" stroke="#BFC9D4" stroke-width="2"/>
  <text x="102" y="240" fill="#264B78" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">Distributed</text>
  <text x="102" y="264" fill="#264B78" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">Sampler</text>
  <text x="102" y="290" fill="#46515F" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">Global dataset</text>
  <rect x="102" y="310" width="172" height="36" rx="12" fill="#DCE7F2"/>
  <text x="121" y="334" fill="#17344D" font-family="IBM Plex Mono, monospace" font-size="17">batch shard 0</text>
  <rect x="102" y="358" width="172" height="36" rx="12" fill="#DCE7F2"/>
  <text x="121" y="382" fill="#17344D" font-family="IBM Plex Mono, monospace" font-size="17">batch shard 1</text>
  <rect x="102" y="406" width="172" height="36" rx="12" fill="#DCE7F2"/>
  <text x="121" y="430" fill="#17344D" font-family="IBM Plex Mono, monospace" font-size="17">batch shard 2</text>
  <rect x="102" y="454" width="172" height="36" rx="12" fill="#DCE7F2"/>
  <text x="121" y="478" fill="#17344D" font-family="IBM Plex Mono, monospace" font-size="17">batch shard 3</text>

  <g stroke="#7C8A98" stroke-width="4" stroke-linecap="round">
    <path d="M304 328H374"/>
    <path d="M304 376H374"/>
    <path d="M304 424H374"/>
    <path d="M304 472H374"/>
  </g>

  <g>
    <rect x="374" y="200" width="220" height="196" rx="18" fill="#FFFFFF" stroke="#CFD8E3" stroke-width="2"/>
    <text x="406" y="238" fill="#1C395B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700">Rank 0</text>
    <rect x="406" y="256" width="156" height="34" rx="10" fill="#F6E8C7"/>
    <text x="421" y="279" fill="#6F5A42" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">local mini-batch</text>
    <rect x="406" y="302" width="156" height="34" rx="10" fill="#E6F0FB"/>
    <text x="414" y="325" fill="#264B78" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">full model replica</text>
    <rect x="406" y="348" width="156" height="30" rx="10" fill="#EAF5EC"/>
    <text x="447" y="369" fill="#355E3B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">backward</text>
  </g>

  <g>
    <rect x="624" y="200" width="220" height="196" rx="18" fill="#FFFFFF" stroke="#CFD8E3" stroke-width="2"/>
    <text x="656" y="238" fill="#1C395B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700">Rank 1</text>
    <rect x="656" y="256" width="156" height="34" rx="10" fill="#F6E8C7"/>
    <text x="671" y="279" fill="#6F5A42" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">local mini-batch</text>
    <rect x="656" y="302" width="156" height="34" rx="10" fill="#E6F0FB"/>
    <text x="664" y="325" fill="#264B78" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">full model replica</text>
    <rect x="656" y="348" width="156" height="30" rx="10" fill="#EAF5EC"/>
    <text x="697" y="369" fill="#355E3B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">backward</text>
  </g>

  <g>
    <rect x="874" y="200" width="220" height="196" rx="18" fill="#FFFFFF" stroke="#CFD8E3" stroke-width="2"/>
    <text x="906" y="238" fill="#1C395B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700">Rank 2</text>
    <rect x="906" y="256" width="156" height="34" rx="10" fill="#F6E8C7"/>
    <text x="921" y="279" fill="#6F5A42" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">local mini-batch</text>
    <rect x="906" y="302" width="156" height="34" rx="10" fill="#E6F0FB"/>
    <text x="914" y="325" fill="#264B78" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">full model replica</text>
    <rect x="906" y="348" width="156" height="30" rx="10" fill="#EAF5EC"/>
    <text x="947" y="369" fill="#355E3B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">backward</text>
  </g>

  <g>
    <rect x="1124" y="200" width="220" height="196" rx="18" fill="#FFFFFF" stroke="#CFD8E3" stroke-width="2"/>
    <text x="1156" y="238" fill="#1C395B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="700">Rank 3</text>
    <rect x="1156" y="256" width="156" height="34" rx="10" fill="#F6E8C7"/>
    <text x="1171" y="279" fill="#6F5A42" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">local mini-batch</text>
    <rect x="1156" y="302" width="156" height="34" rx="10" fill="#E6F0FB"/>
    <text x="1164" y="325" fill="#264B78" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">full model replica</text>
    <rect x="1156" y="348" width="156" height="30" rx="10" fill="#EAF5EC"/>
    <text x="1197" y="369" fill="#355E3B" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">backward</text>
  </g>

  <g stroke="#8BA4BC" stroke-width="4" stroke-linecap="round">
    <path d="M484 396V460"/>
    <path d="M734 396V460"/>
    <path d="M984 396V460"/>
    <path d="M1234 396V460"/>
  </g>

  <!-- Gradient All-Reduce box — text split across two lines to stay inside rect -->
  <rect x="374" y="472" width="970" height="130" rx="20" fill="#EEF2F5" stroke="#C7D0D8" stroke-width="2"/>
  <text x="409" y="512" fill="#264B78" font-family="IBM Plex Sans, Arial, sans-serif" font-size="26" font-weight="700">Gradient All-Reduce</text>
  <text x="409" y="545" fill="#46515F" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">Ranks synchronize averaged gradients after each backward pass.</text>
  <text x="409" y="570" fill="#46515F" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">Parameters stay replicated on every device — simple but no per-device model-state savings.</text>

  <!-- What is not here — taller box so all text fits -->
  <rect x="72" y="480" width="276" height="116" rx="18" fill="#FFF6E8" stroke="#D6C5A7" stroke-width="2"/>
  <text x="100" y="514" fill="#6F5A42" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="700">Not present today</text>
  <text x="100" y="543" fill="#6F5A42" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">No FSDP (sharding)</text>
  <text x="100" y="566" fill="#6F5A42" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">No ZeRO optimizer</text>
  <text x="100" y="589" fill="#6F5A42" font-family="IBM Plex Sans, Arial, sans-serif" font-size="17">No tensor parallelism</text>

  <!-- Bottom legend -->
  <text x="72" y="636" fill="#7A8A9A" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">DDP = Distributed Data Parallel · FSDP = Fully Sharded Data Parallel · ZeRO = Zero Redundancy Optimizer</text>
</svg>
