<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">RGG, MeshKit, and MOOSE Reactor Module lineage</title>
  <desc id="desc">A timeline showing reactor meshing work moving from RGG and MeshKit through NEAMS workflows to the MOOSE Reactor Module.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#eef6f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#19324a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="24" fill="url(#bg)"/>
  <g fill="none" stroke="#7a8c9f" stroke-width="4" stroke-linecap="round">
    <path d="M155 270 C325 180 455 355 620 260 S920 190 1050 275"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="70" y="88" width="250" height="330" rx="12" fill="#ffffff" stroke="#d8e2ea"/>
    <rect x="475" y="88" width="250" height="330" rx="12" fill="#ffffff" stroke="#d8e2ea"/>
    <rect x="880" y="88" width="250" height="330" rx="12" fill="#ffffff" stroke="#d8e2ea"/>
  </g>
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="110" y="140" fill="#1d3557" font-size="20" font-weight="700">2009-2012</text>
    <text x="110" y="174" fill="#0f172a" font-size="30" font-weight="800">RGG</text>
    <text x="110" y="212" fill="#334155" font-size="17">Reactor Geometry</text>
    <text x="110" y="238" fill="#334155" font-size="17">and Mesh Generator</text>
    <text x="110" y="292" fill="#475569" font-size="15">Lattice hierarchy</text>
    <text x="110" y="318" fill="#475569" font-size="15">Pins, assemblies, cores</text>
    <text x="110" y="344" fill="#475569" font-size="15">Repeatable reactor layouts</text>

    <text x="515" y="140" fill="#1d3557" font-size="20" font-weight="700">2013-2016</text>
    <text x="515" y="174" fill="#0f172a" font-size="30" font-weight="800">MeshKit</text>
    <text x="515" y="212" fill="#334155" font-size="17">NEAMS mesh generation</text>
    <text x="515" y="238" fill="#334155" font-size="17">toolkit and workflows</text>
    <text x="515" y="292" fill="#475569" font-size="15">Parallel generation</text>
    <text x="515" y="318" fill="#475569" font-size="15">Boundary layers</text>
    <text x="515" y="344" fill="#475569" font-size="15">Assembly and full-core models</text>

    <text x="920" y="140" fill="#1d3557" font-size="20" font-weight="700">2023</text>
    <text x="920" y="174" fill="#0f172a" font-size="30" font-weight="800">MOOSE</text>
    <text x="920" y="212" fill="#334155" font-size="17">Reactor Module</text>
    <text x="920" y="238" fill="#334155" font-size="17">native meshing path</text>
    <text x="920" y="292" fill="#475569" font-size="15">Open-source access</text>
    <text x="920" y="318" fill="#475569" font-size="15">Hex and Cartesian cores</text>
    <text x="920" y="344" fill="#475569" font-size="15">Tagged regions for analysis</text>
  </g>
  <g fill="#1d3557">
    <circle cx="195" cy="270" r="10"/>
    <circle cx="600" cy="270" r="10"/>
    <circle cx="1005" cy="270" r="10"/>
  </g>
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" text-anchor="middle">
    <text x="600" y="458" fill="#334155" font-size="22" font-weight="700">Same durable idea: make reactor geometry explicit, reusable, and close to the physics workflow.</text>
  </g>
</svg>
