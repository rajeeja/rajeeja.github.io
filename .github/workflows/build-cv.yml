name: Build Resume PDFs

on:
  push:
    paths:
      - 'cv/**.tex'
      - 'scripts/update_resume.sh'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends texlive-latex-base texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-plain-generic texlive-science latexmk
      - name: Build PDFs
        run: |
          SKIP_SCHOLAR=1 bash scripts/update_resume.sh
      - name: Commit PDFs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          # Update local with remote before pushing to avoid non-fast-forward
          git fetch origin master
          git pull --rebase origin master || true
          git add files/Rajeev_Jain_CV.pdf files/Rajeev_Jain_Resume.pdf
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(cv): update generated PDFs"
            git push origin HEAD:master
          fi
