name: Build Resume PDFs

on:
  push:
    paths:
      - 'cv/**.tex'
      - 'scripts/update_resume.sh'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Tectonic
        run: |
          curl -fsSL -o /tmp/tectonic.tar.gz https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.15.0/tectonic-0.15.0-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf /tmp/tectonic.tar.gz -C /tmp
          echo "/tmp" >> "$GITHUB_PATH"
      - name: Build PDFs
        run: |
          SKIP_SCHOLAR=1 bash scripts/update_resume.sh
      - name: Commit PDFs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          # Update local with remote before pushing to avoid non-fast-forward
          git fetch origin master
          git pull --rebase origin master || true
          git add files/Rajeev_Jain_CV.pdf files/Rajeev_Jain_Resume.pdf
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(cv): update generated PDFs"
            git push origin HEAD:master
          fi
